<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecnocell Acessórios | Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    
    <style>
        :root {
            --primary: #0066ff;
            --secondary: #00d2ff;
            --dark: #060b16;
            --glass: rgba(255, 255, 255, 0.9);
            --text: #1a1a1a;
            --white: #ffffff;
            --gradient: linear-gradient(135deg, #0066ff 0%, #00d2ff 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #f0f5ff;
            background-image: radial-gradient(circle at top right, #e6f0ff, transparent),
                              radial-gradient(circle at bottom left, #e6f0ff, transparent);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Header & Nav */
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        /* Hero Section */
        .hero {
            padding: 80px 20px;
            text-align: center;
            background: var(--dark);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.2;
        }

        .hero h2 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 15px;
            position: relative;
        }

        .hero p {
            font-size: 1.1rem;
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        /* Filtros */
        .controls {
            max-width: 1200px;
            margin: -30px auto 40px;
            padding: 20px;
            background: var(--glass);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 10;
        }

        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 25px;
            border: none;
            background: #eee;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: var(--gradient);
            color: white;
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.3);
        }

        .gb-filter select {
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
            font-weight: 600;
        }

        /* Grid de Produtos */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--white);
            border-radius: 25px;
            padding: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 30px 60px rgba(0, 102, 255, 0.15);
        }

        .card-img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .card:hover .card-img {
            transform: scale(1.1);
        }

        .badge-gb {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 102, 255, 0.1);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 800;
        }

        .card h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .price {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 20px;
            display: block;
        }

        .btn-buy {
            background: var(--gradient);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 15px;
            border-radius: 15px;
            font-weight: 700;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-buy:hover {
            filter: brightness(1.1);
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.3);
        }

        /* Floating Buttons */
        .float-btns {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        .f-btn {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: 0.3s;
            text-decoration: none;
        }

        .f-btn:hover { transform: scale(1.1) rotate(5deg); }
        .wa { background: #25d366; }
        .ig { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }

        footer {
            background: var(--dark);
            color: white;
            padding: 50px 20px;
            text-align: center;
            margin-top: 100px;
        }

        @media (max-width: 768px) {
            .hero h2 { font-size: 2rem; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">TECNOCELL</div>
        <div class="header-links">
            <a href="https://instagram.com/seu_insta" target="_blank" style="color: var(--primary); font-size: 1.5rem;"><i class="fab fa-instagram"></i></a>
        </div>
    </header>

    <section class="hero">
        <h2 data-aos="fade-up">Tecnologia Premium</h2>
        <p data-aos="fade-up" data-aos-delay="100">Encontre os melhores smartphones com garantia e o melhor preço do mercado.</p>
    </section>

    <div class="controls" data-aos="zoom-in">
        <div class="tabs">
            <button class="tab-btn active" onclick="filterBrand('all')"><i class="fas fa-th-large"></i> Todos</button>
            <button class="tab-btn" onclick="filterBrand('iphone')"><i class="fab fa-apple"></i> iPhone</button>
            <button class="tab-btn" onclick="filterBrand('samsung')"><i class="fas fa-mobile-alt"></i> Samsung</button>
        </div>
        <div class="gb-filter">
            <select id="gb-select" onchange="applyFilters()">
                <option value="all">Todo armazenamento</option>
                <option value="128GB">128 GB</option>
                <option value="256GB">256 GB</option>
                <option value="512GB">512 GB</option>
            </select>
        </div>
    </div>

    <main class="container" id="product-grid">
        <!-- JS inyectará os cards aqui -->
    </main>

    <div class="float-btns">
        <a href="https://instagram.com/tecnocell" class="f-btn ig"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/5500000000000" class="f-btn wa"><i class="fab fa-whatsapp"></i></a>
    </div>

    <footer>
        <p><strong>Tecnocell Acessórios</strong></p>
        <p style="opacity: 0.6; margin-top: 10px;">© 2024 - Qualidade e Confiança</p>
    </footer>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        // Inicializa animações
        AOS.init({ duration: 800, once: true });

        const products = [
            { brand: 'iphone', model: 'iPhone 15 Pro Max', gb: '256GB', price: '7.499', img: 'https://m.media-amazon.com/images/I/81Os1nnA5pL._AC_SL1500_.jpg' },
            { brand: 'iphone', model: 'iPhone 15', gb: '128GB', price: '4.899', img: 'https://m.media-amazon.com/images/I/71d7rfSl0wL._AC_SL1500_.jpg' },
            { brand: 'iphone', model: 'iPhone 14', gb: '128GB', price: '3.999', img: 'https://m.media-amazon.com/images/I/610pghkO81L._AC_SL1500_.jpg' },
            { brand: 'samsung', model: 'Galaxy S24 Ultra', gb: '512GB', price: '6.299', img: 'https://m.media-amazon.com/images/I/71f6B-rKzOL._AC_SL1500_.jpg' },
            { brand: 'samsung', model: 'Galaxy S23 FE', gb: '128GB', price: '2.599', img: 'https://m.media-amazon.com/images/I/61SUnmYfS6L._AC_SL1500_.jpg' },
            { brand: 'samsung', model: 'Galaxy A55', gb: '256GB', price: '1.999', img: 'https://m.media-amazon.com/images/I/61fF1j3+1lL._AC_SL1000_.jpg' },
        ];

        let currentBrand = 'all';

        function render(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            items.forEach((p, index) => {
                grid.innerHTML += `
                    <div class="card" data-aos="fade-up" data-aos-delay="${index * 50}">
                        <span class="badge-gb">${p.gb}</span>
                        <img src="${p.img}" class="card-img" alt="${p.model}">
                        <h3>${p.model}</h3>
                        <span class="price">R$ ${p.price}</span>
                        <a href="https://wa.me/5500000000000?text=Olá! Tenho interesse no ${p.model}" target="_blank" class="btn-buy">
                            <i class="fab fa-whatsapp"></i> Comprar Agora
                        </a>
                    </div>
                `;
            });
        }

        function filterBrand(brand) {
            currentBrand = brand;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const gb = document.getElementById('gb-select').value;
            const filtered = products.filter(p => {
                const bM = currentBrand === 'all' || p.brand === currentBrand;
                const gM = gb === 'all' || p.gb === gb;
                return bM && gM;
            });
            render(filtered);
        }

        // Init
        render(products);
    </script>
</body>
</html>
